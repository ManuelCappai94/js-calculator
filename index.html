<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link src="./src/styles/styles.css" rel="stylesheet" type="text/css" />
    <title>Calculator</title>
</head>

<body>
    <div class="calculator">
        <div class="buttons">
            <button class="buttonClear" onclick="clearDisplay()">C</button>
            <button class="buttonOperator" onclick="appendOperation('/')">/</button>
            <button class="buttonOperator" onclick="appendOperation('*')">*</button>
            <button class="buttonOperator" onclick="appendOperation('-')">-</button>
            <button class="buttonOperator" onclick="appendOperation('+')">+</button>
        </div>
    </div>
</body>

</html>
