<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./src/images/icons8-calculator-16.ico">
    <link href="./src/styles/styles.css" rel="stylesheet" type="text/css" />
    <title>Calculator</title>
</head>

<body>
    <main class="container">
        <div class="calculator">
            <div class="calcTop">
                <picture class="calcLogo"><img src="./src/images/logo.png" alt="alabama instruments logo"></picture>
                <input type="text" id="display" class="calcDisplay" disabled>
            </div>
            <div class="calcButtons">
                <button class="buttonClear" onclick="clearDisplay()">&#8705</button>
                <div></div>
                <div class="calcSolar">
                    <picture><img src="./src/images/solar_panel.png"></picture>
                </div>
                <div></div>

                <button class="buttonNum" onclick="selectNumber('7')">7</button>
                <button class="buttonNum" onclick="selectNumber('8')">8</button>
                <button class="buttonNum" onclick="selectNumber('9')">9</button>
                <button class="buttonOperator" onclick="selectOperation('/')">&#xF7</button>

                <button class="buttonNum" onclick="selectNumber('4')">4</button>
                <button class="buttonNum" onclick="selectNumber('5')">5</button>
                <button class="buttonNum" onclick="selectNumber('6')">6</button>
                <button class="buttonOperator" onclick="selectOperation('*')">&#215</button>

                <button class="buttonNum" onclick="selectNumber('1')">1</button>
                <button class="buttonNum" onclick="selectNumber('2')">2</button>
                <button class="buttonNum" onclick="selectNumber('3')">3</button>
                <button class="buttonOperator" onclick="selectOperation('-')">&#8722</button>

                <button class="FbuttonNum" onclick="selectNumber('.')">&#8729</button>
                <button class="buttonNum" onclick="selectNumber('0')">0</button>
                <button class="buttonEqual" onclick="calculate()">&#61</button>
                <button class="buttonOperator" onclick="selectOperation('+')">&#43</button>
            </div>
        </div>
    </main>
</body>

</html>
