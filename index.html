<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./src/images/icons8-calculator-16.ico">
    <link href="./src/styles/styles.css" rel="stylesheet" />
    <script type="module" src="./src/script/script.js" defer></script>
    <title>Calculator</title>
</head>

<body>
    <main>
        <div class="modal" id="instructionModal">
            <div class="modal-content">

                <button class="close-modal" aria-label="Close">&times;</button>

                <div class="instructor">
                    <div class="stripes"></div>

                    <h3>READ ME FIRST!</h3>

                    <p>
                        <strong>
                            On this calculator app, you can use the keyboard to interact with the calculator.
                        </strong>
                    </p>

                    <p>
                        <strong>
                            Valid inputs consist of digits from 0 to 9 and the operators:
                            <br>
                            "/", "*", "-", "+", ".", "=", "Enter", "Backspace"
                        </strong>
                    </p>

                    <div class="stripes"></div>
                </div>

            </div>
        </div>

        <article>
            <button id="instructionsBtn" type="button">
                📖 Instructions
            </button>
        </article>

        <article class="calculator-container">
            <div class="calculator">
                <div class="calcTop">
                    <picture class="calcLogo">
                        <img src="./src/images/logo.png" alt="alabama instruments logo">
                    </picture>
                    <div class="display-wrapper">
                        <input type="text" id="display" class="calcDisplay" readonly>
                        <span class="operator-indicator"></span>
                    </div>
                </div>
                <div class="calcButtons">
                    <button class="buttonClear" data-action="clear" type="button">&#8705</button>
                    <button class="buttonClear" data-action="undo" type="button">Undo</button>
                    <div class="calcScroll">
                        <button class="scrollBtn" data-scroll="left" type="button"
                            aria-label="scroll display left">&#8592;</button>
                    </div>

                    <div>
                        <button class="scrollBtn" data-scroll="right" type="button"
                            aria-label="scroll display right">&#8594;</button>
                    </div>

                    <button class="buttonNum" data-number="7" type="button">7</button>
                    <button class="buttonNum" data-number="8" type="button">8</button>
                    <button class="buttonNum" data-number="9" type="button">9</button>
                    <button class="buttonOperator" data-operator="/" type="button">&#xF7</button>

                    <button class="buttonNum" data-number="4" type="button">4</button>
                    <button class="buttonNum" data-number="5" type="button">5</button>
                    <button class="buttonNum" data-number="6" type="button">6</button>
                    <button class="buttonOperator" data-operator="*" type="button">&#215</button>

                    <button class="buttonNum" data-number="1" type="button">1</button>
                    <button class="buttonNum" data-number="2" type="button">2</button>
                    <button class="buttonNum" data-number="3" type="button">3</button>
                    <button class="buttonOperator" data-operator="-" type="button">&#8722</button>

                    <button class="buttonNum" data-action="decimal" type="button">&#46</button>
                    <button class="buttonNum" data-number="0" type="button">0</button>
                    <button class="buttonOperator" data-action="equals" type="button">&#61</button>
                    <button class="buttonOperator" data-operator="+" type="button">&#43</button>
                </div>
            </div>
            <section class="operation-overview" aria-labelledby="operation-overview-title">
                <h2 class="operation-overview-title">
                    Calculation Overview
                </h2>

                <div class="history-container">
                    <h3 class="history-title">Calculation History</h3>

                    <ul class="calculation-history">
                        <li class="empty-history-message">No calculations yet.</li>
                    </ul>
                </div>

                <div class="current-operation-container">
                    <h3 class="current-operation-title">Current Operation</h3>

                    <p class="operation-preview"></p>

                </div>
                <button data-action="clear-history" class="resetHistory" type="button">Clear History</button>

            </section>
        </article>

    </main>
</body>

</html>
